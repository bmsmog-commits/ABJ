<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#007bff" />
    <link
      rel="canonical"
      href="https://abjfoundation.ngo/reset-password.html"
    />
    <meta property="og:type" content="website" />
    <meta
      property="og:url"
      content="https://abjfoundation.ngo/reset-password.html"
    />
    <meta property="og:title" content="Reset Password | ABJ Foundation" />
    <meta
      property="og:description"
      content="Set a new password for your ABJ Foundation account."
    />
    <meta
      name="description"
      content="Set a new password for your ABJ Foundation account."
    />
    <title>Reset Password | ABJ Foundation</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="container header-inner">
        <a class="brand" href="index.html">ABJ Foundation</a>
        <nav class="main-nav" aria-label="Primary navigation">
          <button
            class="nav-toggle"
            aria-expanded="false"
            aria-controls="primary-menu"
          >
            Menu
          </button>
          <ul class="nav-menu" id="primary-menu">
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="donate.html">Donate</a></li>
            <li><a href="request-help.html">Request Help</a></li>
            <li><a href="contact.html">Contact</a></li>
          </ul>
        </nav>
      </div>
    </header>

    <main>
      <section class="section section-form">
        <div class="container">
          <div class="form-panel">
            <div class="form-panel-copy">
              <span class="eyebrow">New password</span>
              <h1>Create a new password</h1>
              <p>Choose a strong password for your ABJ Foundation account.</p>
            </div>
            <div class="card auth-card">
              <form
                id="reset-password-form"
                class="validate-form"
                aria-label="Reset password form"
                data-token=""
              >
                <div class="form-group">
                  <label for="new-password">New Password</label>
                  <input
                    type="password"
                    id="new-password"
                    name="password"
                    placeholder="Enter new password"
                    required
                  />
                </div>
                <div class="form-group">
                  <label for="confirm-password">Confirm Password</label>
                  <input
                    type="password"
                    id="confirm-password"
                    name="confirmPassword"
                    placeholder="Confirm new password"
                    required
                  />
                </div>
                <button type="submit" class="btn btn-primary btn-block">
                  Reset Password
                </button>
              </form>
            </div>
          </div>
        </div>
      </section>
    </main>

    <script src="js/app.js"></script>
    <script src="js/auth.js"></script>
  </body>
</html>
