<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#007bff" />
    <link
      rel="canonical"
      href="https://abjfoundation.ngo/forgot-password.html"
    />
    <meta property="og:type" content="website" />
    <meta
      property="og:url"
      content="https://abjfoundation.ngo/forgot-password.html"
    />
    <meta property="og:title" content="Forgot Password | ABJ Foundation" />
    <meta
      property="og:description"
      content="Reset your ABJ Foundation password securely."
    />
    <meta
      name="description"
      content="Reset your ABJ Foundation password securely."
    />
    <title>Forgot Password | ABJ Foundation</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="container header-inner">
        <a class="brand" href="index.html">ABJ Foundation</a>
        <nav class="main-nav" aria-label="Primary navigation">
          <button
            class="nav-toggle"
            aria-expanded="false"
            aria-controls="primary-menu"
          >
            Menu
          </button>
          <ul class="nav-menu" id="primary-menu">
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="donate.html">Donate</a></li>
            <li><a href="request-help.html">Request Help</a></li>
            <li><a href="contact.html">Contact</a></li>
          </ul>
        </nav>
      </div>
    </header>

    <main>
      <section class="section section-form">
        <div class="container">
          <div class="form-panel">
            <div class="form-panel-copy">
              <span class="eyebrow">Password recovery</span>
              <h1>Forgot your password?</h1>
              <p>
                Enter your email and we will send you a secure link to reset it.
              </p>
            </div>
            <div class="card auth-card">
              <form
                id="forgot-password-form"
                class="validate-form"
                aria-label="Forgot password form"
              >
                <div class="form-group">
                  <label for="forgot-email">Email</label>
                  <input
                    type="email"
                    id="forgot-email"
                    name="email"
                    placeholder="you@example.com"
                    required
                  />
                </div>
                <button type="submit" class="btn btn-primary btn-block">
                  Send Reset Link
                </button>
                <p class="auth-note"><a href="login.html">Back to login</a></p>
              </form>
            </div>
          </div>
        </div>
      </section>
    </main>

    <script src="js/app.js"></script>
    <script src="js/auth.js"></script>
  </body>
</html>
